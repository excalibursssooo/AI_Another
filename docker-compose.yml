services:
  postgres:
    image: postgres:16-alpine
    container_name: companion-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-companion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - companion_postgres_data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: companion-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - companion_qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  companion_postgres_data:
  companion_qdrant_data:
